<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>{{ 'pages.notifications.title' | translate }}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-list>
    <ion-item *ngIf="showRequestButton" button (click)="notifications.requestPermissions()">Request permissions</ion-item>
    <ion-item *ngIf="showSettingsButton" button (click)="notifications.openSettings()">Settings</ion-item>
    <ng-container *ngIf="showControls">
      <ion-item button (click)="notifications.test()">Test</ion-item>
      <ion-item button (click)="notifications.cancel()">Cancel</ion-item>
    </ng-container>
  </ion-list>
</ion-content>
