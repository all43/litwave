<ion-list>
  <ion-item>
    <ion-label>Flashlight</ion-label>
    <ion-toggle slot="end" [ngModel]="syncFlashlight" (ngModelChange)="toggleFlash($event)"></ion-toggle>
  </ion-item>
  <div id="light-area" [ngClass]="{ on: messageService.stream$ | async }">
    <span *ngIf="messageService.countDown$ | async as countDown">
      Next sequence in: {{ (countDown / 1000) | number: '2.0-0' }} sec.
    </span>
  </div>
</ion-list>
