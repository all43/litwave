<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Support — Litwave</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0f172a" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <style>
    :root {
      --primary-light: #6366f1;
      --bg: #0f0f0f;
      --surface: #1a1a2e;
      --text: #e0e0e0;
      --text-muted: #888;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px 64px;
    }
    .logo {
      font-size: 1.6rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--primary-light), #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 40px;
      text-decoration: none;
    }
    .content {
      width: 100%;
      max-width: 680px;
    }
    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 40px;
    }
    h2 {
      font-size: 1.15rem;
      font-weight: 600;
      margin: 32px 0 12px;
      color: var(--primary-light);
    }
    p {
      line-height: 1.7;
      color: #ccc;
      margin-bottom: 12px;
    }
    a {
      color: var(--primary-light);
      text-decoration: none;
    }
    a:hover { text-decoration: underline; }
    #faq-list { margin-bottom: 8px; }
    #faq-list .loading { color: var(--text-muted); font-size: 0.95rem; }
  </style>
</head>
<body>
  <a class="logo" href="/">Litwave</a>

  <div class="content">
    <h1>Support</h1>

    <div id="faq-list"><p class="loading">Loading…</p></div>

    <h2>Still need help?</h2>
    <p>Email us at <a href="mailto:mail@malikov.dev">mail@malikov.dev</a> and we'll get back to you.</p>
  </div>

  <script>
    fetch('/assets/faq.json')
      .then(r => r.json())
      .then(items => {
        const container = document.getElementById('faq-list');
        container.innerHTML = items.map(item =>
          `<h2>${item.q}</h2><p>${item.a}</p>`
        ).join('');
      })
      .catch(() => {
        document.getElementById('faq-list').innerHTML = '';
      });
  </script>
</body>
</html>
