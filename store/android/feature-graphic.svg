<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 500">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="25" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="text-glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="bg-grad" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </radialGradient>
  </defs>

  <rect width="1024" height="500" fill="url(#bg-grad)"/>

  <!-- glow halos -->
  <circle cx="262" cy="195" r="95" fill="#60a5fa" opacity="0.12" filter="url(#glow)"/>
  <circle cx="372" cy="142" r="95" fill="#60a5fa" opacity="0.16" filter="url(#glow)"/>
  <circle cx="512" cy="195" r="95" fill="#60a5fa" opacity="0.12" filter="url(#glow)"/>
  <circle cx="622" cy="248" r="95" fill="#60a5fa" opacity="0.09" filter="url(#glow)"/>
  <circle cx="762" cy="195" r="95" fill="#60a5fa" opacity="0.12" filter="url(#glow)"/>

  <!-- main circles (wave) -->
  <circle cx="262" cy="195" r="42" fill="#60a5fa" opacity="0.75"/>
  <circle cx="372" cy="142" r="42" fill="#60a5fa" opacity="0.90"/>
  <circle cx="512" cy="195" r="42" fill="#60a5fa" opacity="0.75"/>
  <circle cx="622" cy="248" r="42" fill="#60a5fa" opacity="0.55"/>
  <circle cx="762" cy="195" r="42" fill="#60a5fa" opacity="0.75"/>

  <!-- app name -->
  <text x="512" y="365" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="62" font-weight="700" fill="white" letter-spacing="12" filter="url(#text-glow)">LITWAVE</text>
</svg>
